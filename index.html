<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💕 Test de Compatibilidad</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --pink-bg: #ffd6e0;
    --pink-light: #ffe4ed;
    --pink-mid: #ffb3c6;
    --pink-deep: #ff85a1;
    --red-heart: #e8003d;
    --red-soft: #ff4d6d;
    --text-dark: #5a1a2e;
    --text-mid: #8b3a52;
    --card-bg: rgba(255,255,255,0.72);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background-color: var(--pink-bg);
    font-family: 'Nunito', sans-serif;
    overflow-x: hidden;
    position: relative;
  }

  /* FLOATING HEARTS */
  .hearts-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .heart-float {
    position: absolute;
    bottom: -60px;
    animation: floatUp linear infinite;
    opacity: 0.18;
    color: var(--red-heart);
  }
  @keyframes floatUp {
    0%   { transform: translateY(0) rotate(0deg) scale(1);    opacity: 0.18; }
    50%  { transform: translateY(-45vh) rotate(20deg) scale(1.1); opacity: 0.22; }
    100% { transform: translateY(-110vh) rotate(-10deg) scale(0.8); opacity: 0; }
  }

  /* CONTAINER */
  .container {
    position: relative;
    z-index: 1;
    max-width: 620px;
    margin: 0 auto;
    padding: 36px 20px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 26px;
  }

  /* TITLE */
  .title-block { text-align: center; }
  .title-emoji {
    font-size: 2.4rem;
    display: block;
    margin-bottom: 6px;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { transform: scale(1); }
    50%      { transform: scale(1.13); }
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: var(--text-dark);
  }
  h1 em { color: var(--red-soft); font-style: italic; }
  .subtitle { margin-top: 5px; font-size: 0.87rem; color: var(--text-mid); letter-spacing: 0.04em; }

  /* INPUT CARD */
  .card {
    width: 100%;
    background: var(--card-bg);
    backdrop-filter: blur(12px);
    border-radius: 28px;
    padding: 28px 24px;
    box-shadow: 0 8px 40px rgba(232,0,61,0.12), 0 2px 8px rgba(0,0,0,0.06);
    border: 1.5px solid rgba(255,255,255,0.65);
  }
  .names-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .input-group { flex: 1; min-width: 110px; display: flex; flex-direction: column; gap: 5px; }
  label { font-size: 0.76rem; font-weight: 700; color: var(--text-mid); letter-spacing: 0.06em; text-transform: uppercase; }
  input[type="text"] {
    width: 100%;
    padding: 11px 16px;
    border-radius: 50px;
    border: 2px solid var(--pink-mid);
    background: var(--pink-light);
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    color: var(--text-dark);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input[type="text"]:focus {
    border-color: var(--red-soft);
    box-shadow: 0 0 0 4px rgba(255,75,109,0.15);
  }
  input[type="text"]::placeholder { color: #d4919f; }
  .heart-sep { font-size: 1.5rem; color: var(--red-heart); flex-shrink: 0; padding-top: 22px; animation: pulse 2s ease-in-out infinite; }
  .btn {
    width: 100%;
    padding: 13px;
    border-radius: 50px;
    border: none;
    background: linear-gradient(135deg, var(--red-soft) 0%, var(--red-heart) 100%);
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-size: 1.02rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 18px rgba(232,0,61,0.35);
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(232,0,61,0.4); }
  .btn:active { transform: translateY(0); }

  /* RESULTS */
  .results {
    width: 100%;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    animation: fadeSlide 0.5s ease both;
  }
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .results.visible { display: flex; }

  .result-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    color: var(--text-dark);
    font-style: italic;
    text-align: center;
  }

  /* THERMOMETERS ROW */
  .thermo-card {
    width: 100%;
    background: var(--card-bg);
    backdrop-filter: blur(12px);
    border-radius: 28px;
    padding: 28px 16px 24px;
    box-shadow: 0 8px 40px rgba(232,0,61,0.10), 0 2px 8px rgba(0,0,0,0.05);
    border: 1.5px solid rgba(255,255,255,0.65);
  }

  .thermo-row {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 10px;
    flex-wrap: nowrap;
  }

  /* Scale on the left */
  .thermo-scale {
    height: 200px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: flex-end;
    padding-right: 4px;
    padding-bottom: 3px;
    flex-shrink: 0;
  }
  .scale-label {
    font-size: 0.65rem;
    font-weight: 800;
    color: var(--text-mid);
    line-height: 1;
  }

  .thermo-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    flex: 1;
    min-width: 50px;
    max-width: 88px;
  }

  /* percentage label on top */
  .thermo-pct {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--red-heart);
    min-height: 1.4em;
    text-align: center;
  }

  /* the thermometer tube */
  .thermo-tube {
    width: 28px;
    height: 200px;
    background: rgba(255,179,198,0.3);
    border-radius: 40px 40px 6px 6px;
    border: 2px solid rgba(232,0,61,0.22);
    position: relative;
    overflow: hidden;
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.07), inset -3px 0 6px rgba(255,255,255,0.4);
  }

  /* tick marks */
  .thermo-tube::before {
    content: '';
    position: absolute;
    left: 0; right: 0;
    top: 0; bottom: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent,
      transparent 19px,
      rgba(232,0,61,0.15) 19px,
      rgba(232,0,61,0.15) 20px
    );
    z-index: 2;
    pointer-events: none;
  }

  /* gloss stripe */
  .thermo-tube::after {
    content: '';
    position: absolute;
    top: 6px; bottom: 6px;
    left: 5px;
    width: 5px;
    background: rgba(255,255,255,0.35);
    border-radius: 10px;
    z-index: 3;
    pointer-events: none;
  }

  .thermo-fill {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 0%;
    border-radius: 0 0 6px 6px;
    transition: height 1.3s cubic-bezier(0.34, 1.2, 0.64, 1);
    background: linear-gradient(to top, #c0002e 0%, var(--red-heart) 30%, var(--red-soft) 65%, #ff85a1 100%);
    z-index: 1;
  }

  /* bulb at bottom */
  .thermo-bulb {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #ff85a1, var(--red-heart) 70%, #9b0025);
    border: 2px solid rgba(180,0,40,0.35);
    box-shadow: 0 4px 14px rgba(232,0,61,0.4), inset 0 -2px 4px rgba(0,0,0,0.15);
    position: relative;
    margin-top: -5px;
    flex-shrink: 0;
    z-index: 2;
  }
  .thermo-bulb::after {
    content: '';
    position: absolute;
    top: 7px; left: 8px;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.5);
  }

  /* category label & emoji */
  .thermo-emoji { font-size: 1.2rem; }
  .thermo-label {
    font-size: 0.68rem;
    font-weight: 700;
    color: var(--text-dark);
    text-align: center;
    line-height: 1.25;
    hyphens: auto;
    word-break: break-word;
  }

  /* VERDICT */
  .verdict {
    width: 100%;
    text-align: center;
    background: linear-gradient(135deg, rgba(255,180,198,0.5), rgba(255,255,255,0.7));
    border-radius: 20px;
    padding: 18px 22px;
    border: 1.5px solid rgba(232,0,61,0.2);
  }
  .verdict-emoji { font-size: 2rem; }
  .verdict-text {
    margin-top: 6px;
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    color: var(--text-dark);
    font-style: italic;
    line-height: 1.45;
  }
</style>
</head>
<body>

<div class="hearts-bg" id="heartsBg"></div>

<div class="container">

  <div class="title-block">
    <span class="title-emoji">💘</span>
    <h1>Test de <em>Amor</em></h1>
    <p class="subtitle">Descubrí qué tan compatibles son</p>
  </div>

  <div class="card">
    <div class="names-row">
      <div class="input-group">
        <label>Nombre 1</label>
        <input type="text" id="name1" placeholder="Tu nombre" maxlength="30">
      </div>
      <div class="heart-sep">❤️</div>
      <div class="input-group">
        <label>Nombre 2</label>
        <input type="text" id="name2" placeholder="Su nombre" maxlength="30">
      </div>
    </div>
    <button class="btn" onclick="calcular()">✨ Calcular</button>
  </div>

  <div class="results" id="results">
    <p class="result-title" id="resultTitle"></p>

    <div class="thermo-card">
      <div class="thermo-row">

        <!-- Scale -->
        <div style="display:flex;flex-direction:column;align-items:center;gap:8px;padding-bottom:44px;">
          <div style="min-height:1.4em;"></div>
          <div class="thermo-scale">
            <span class="scale-label">100</span>
            <span class="scale-label">75</span>
            <span class="scale-label">50</span>
            <span class="scale-label">25</span>
            <span class="scale-label">0</span>
          </div>
        </div>

        <!-- Amor -->
        <div class="thermo-item">
          <span class="thermo-pct" id="pct-amor">—</span>
          <div class="thermo-tube"><div class="thermo-fill" id="fill-amor"></div></div>
          <div class="thermo-bulb"></div>
          <span class="thermo-emoji">❤️</span>
          <span class="thermo-label">Amor</span>
        </div>

        <!-- Compatibilidad -->
        <div class="thermo-item">
          <span class="thermo-pct" id="pct-compat">—</span>
          <div class="thermo-tube"><div class="thermo-fill" id="fill-compat"></div></div>
          <div class="thermo-bulb"></div>
          <span class="thermo-emoji">🔗</span>
          <span class="thermo-label">Compatibilidad</span>
        </div>

        <!-- Afinidad -->
        <div class="thermo-item">
          <span class="thermo-pct" id="pct-afin">—</span>
          <div class="thermo-tube"><div class="thermo-fill" id="fill-afin"></div></div>
          <div class="thermo-bulb"></div>
          <span class="thermo-emoji">✨</span>
          <span class="thermo-label">Afinidad</span>
        </div>

        <!-- Amistad -->
        <div class="thermo-item">
          <span class="thermo-pct" id="pct-amist">—</span>
          <div class="thermo-tube"><div class="thermo-fill" id="fill-amist"></div></div>
          <div class="thermo-bulb"></div>
          <span class="thermo-emoji">🤝</span>
          <span class="thermo-label">Amistad</span>
        </div>

        <!-- Casamiento -->
        <div class="thermo-item">
          <span class="thermo-pct" id="pct-cas">—</span>
          <div class="thermo-tube"><div class="thermo-fill" id="fill-cas"></div></div>
          <div class="thermo-bulb"></div>
          <span class="thermo-emoji">💍</span>
          <span class="thermo-label">Casamiento</span>
        </div>

      </div>
    </div>

    <div class="verdict">
      <div class="verdict-emoji" id="verdictEmoji"></div>
      <p class="verdict-text" id="verdictText"></p>
    </div>
  </div>

</div>

<script>
  // Floating hearts
  const bg = document.getElementById('heartsBg');
  const heartsArr = ['❤️','🩷','💕','💗','💓','💖','💝'];
  for (let i = 0; i < 28; i++) {
    const h = document.createElement('span');
    h.classList.add('heart-float');
    h.textContent = heartsArr[Math.floor(Math.random() * heartsArr.length)];
    h.style.left = Math.random() * 100 + 'vw';
    h.style.fontSize = (0.9 + Math.random() * 1.6) + 'rem';
    h.style.animationDuration = (8 + Math.random() * 14) + 's';
    h.style.animationDelay = (Math.random() * 14) + 's';
    bg.appendChild(h);
  }

  function getVerdict(avg, n1, n2) {
    if (avg >= 85) return { e:'💞', t:`¡${n1} y ${n2} son una pareja perfecta! El universo los tiene destinados el uno para el otro.` };
    if (avg >= 70) return { e:'😍', t:`${n1} y ${n2} tienen una conexión muy especial. ¡Vale la pena apostar!` };
    if (avg >= 50) return { e:'🥰', t:`Hay chispa entre ${n1} y ${n2}. Con dedicación, todo es posible.` };
    if (avg >= 30) return { e:'🤔', t:`${n1} y ${n2} tienen diferencias, pero la amistad puede ser una gran base.` };
    return { e:'😅', t:`Quizás ${n1} y ${n2} son mejores como amigos… ¡aunque el amor sorprende!` };
  }

  function calcular() {
    const n1 = document.getElementById('name1').value.trim();
    const n2 = document.getElementById('name2').value.trim();
    if (!n1 || !n2) { alert('¡Ingresá los dos nombres! 💕'); return; }

    const rand = () => Math.floor(Math.random() * 100) + 1;
    const vals = { amor: rand(), compat: rand(), afin: rand(), amist: rand(), cas: rand() };
    const avg  = Math.round(Object.values(vals).reduce((a,b)=>a+b,0) / 5);

    document.getElementById('resultTitle').textContent = `${n1} 💕 ${n2}`;

    const map = [
      ['amor',   'pct-amor',   'fill-amor'],
      ['compat', 'pct-compat', 'fill-compat'],
      ['afin',   'pct-afin',   'fill-afin'],
      ['amist',  'pct-amist',  'fill-amist'],
      ['cas',    'pct-cas',    'fill-cas'],
    ];

    map.forEach(([key, pctId, fillId]) => {
      document.getElementById(pctId).textContent = vals[key] + '%';
      const fill = document.getElementById(fillId);
      fill.style.height = '0%';
      requestAnimationFrame(() => requestAnimationFrame(() => {
        fill.style.height = vals[key] + '%';
      }));
    });

    const v = getVerdict(avg, n1, n2);
    document.getElementById('verdictEmoji').textContent = v.e;
    document.getElementById('verdictText').textContent  = v.t;

    const r = document.getElementById('results');
    r.classList.remove('visible');
    void r.offsetWidth;
    r.classList.add('visible');
    r.style.display = 'flex';
    r.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') calcular(); });
</script>
</body>
</html>
