<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💕 Test de Compatibilidad</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --pink-bg: #ffd6e0;
    --pink-light: #ffe4ed;
    --pink-mid: #ffb3c6;
    --pink-deep: #ff85a1;
    --red-heart: #e8003d;
    --red-soft: #ff4d6d;
    --text-dark: #5a1a2e;
    --text-mid: #8b3a52;
    --white-soft: rgba(255,255,255,0.85);
    --card-bg: rgba(255,255,255,0.72);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background-color: var(--pink-bg);
    font-family: 'Nunito', sans-serif;
    overflow-x: hidden;
    position: relative;
  }

  /* ---- FLOATING HEARTS BACKGROUND ---- */
  .hearts-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .heart-float {
    position: absolute;
    bottom: -60px;
    font-size: 1.4rem;
    animation: floatUp linear infinite;
    opacity: 0.18;
    color: var(--red-heart);
  }

  @keyframes floatUp {
    0%   { transform: translateY(0) rotate(0deg) scale(1);   opacity: 0.18; }
    50%  { transform: translateY(-45vh) rotate(20deg) scale(1.1); opacity: 0.22; }
    100% { transform: translateY(-105vh) rotate(-10deg) scale(0.8); opacity: 0; }
  }

  /* ---- MAIN LAYOUT ---- */
  .container {
    position: relative;
    z-index: 1;
    max-width: 560px;
    margin: 0 auto;
    padding: 40px 20px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }

  /* ---- TITLE ---- */
  .title-block {
    text-align: center;
  }

  .title-emoji {
    font-size: 2.4rem;
    display: block;
    margin-bottom: 6px;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%,100% { transform: scale(1); }
    50%      { transform: scale(1.12); }
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: var(--text-dark);
    line-height: 1.15;
  }

  h1 em {
    color: var(--red-soft);
    font-style: italic;
  }

  .subtitle {
    margin-top: 6px;
    font-size: 0.88rem;
    color: var(--text-mid);
    letter-spacing: 0.04em;
  }

  /* ---- CARD ---- */
  .card {
    width: 100%;
    background: var(--card-bg);
    backdrop-filter: blur(12px);
    border-radius: 28px;
    padding: 32px 28px;
    box-shadow: 0 8px 40px rgba(232,0,61,0.12), 0 2px 8px rgba(0,0,0,0.06);
    border: 1.5px solid rgba(255,255,255,0.6);
  }

  /* ---- INPUTS ---- */
  .names-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .input-group {
    flex: 1;
    min-width: 110px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  label {
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--text-mid);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  input[type="text"] {
    width: 100%;
    padding: 12px 16px;
    border-radius: 50px;
    border: 2px solid var(--pink-mid);
    background: var(--pink-light);
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    color: var(--text-dark);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input[type="text"]:focus {
    border-color: var(--red-soft);
    box-shadow: 0 0 0 4px rgba(255,75,109,0.15);
  }

  input[type="text"]::placeholder {
    color: #d4919f;
  }

  .heart-sep {
    font-size: 1.5rem;
    color: var(--red-heart);
    flex-shrink: 0;
    padding-top: 24px;
    animation: pulse 2s ease-in-out infinite;
  }

  /* ---- BUTTON ---- */
  .btn {
    width: 100%;
    padding: 14px;
    border-radius: 50px;
    border: none;
    background: linear-gradient(135deg, var(--red-soft) 0%, var(--red-heart) 100%);
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-size: 1.05rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 18px rgba(232,0,61,0.35);
  }

  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(232,0,61,0.4); }
  .btn:active { transform: translateY(0); }

  /* ---- RESULTS ---- */
  .results {
    width: 100%;
    display: none;
    flex-direction: column;
    gap: 16px;
    animation: fadeSlide 0.5s ease both;
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .results.visible { display: flex; }

  .result-title {
    text-align: center;
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--text-dark);
    font-style: italic;
  }

  /* ---- BAR ITEMS ---- */
  .bar-item {
    background: rgba(255,255,255,0.55);
    border-radius: 18px;
    padding: 14px 18px;
    border: 1px solid rgba(255,180,198,0.5);
  }

  .bar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 9px;
  }

  .bar-label {
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--text-dark);
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .bar-emoji { font-size: 1.1rem; }

  .bar-pct {
    font-family: 'Playfair Display', serif;
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--red-heart);
  }

  .bar-track {
    height: 12px;
    border-radius: 50px;
    background: var(--pink-mid);
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 50px;
    width: 0%;
    transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  /* color scale by value */
  .fill-low    { background: linear-gradient(90deg, #ffb3c6, #ff85a1); }
  .fill-mid    { background: linear-gradient(90deg, #ff85a1, #ff4d6d); }
  .fill-high   { background: linear-gradient(90deg, #ff4d6d, #e8003d); }

  /* ---- VERDICT ---- */
  .verdict {
    text-align: center;
    background: linear-gradient(135deg, rgba(255,180,198,0.5), rgba(255,255,255,0.7));
    border-radius: 20px;
    padding: 18px 22px;
    border: 1.5px solid rgba(232,0,61,0.2);
  }

  .verdict-emoji { font-size: 2rem; }
  .verdict-text {
    margin-top: 6px;
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    color: var(--text-dark);
    font-style: italic;
    line-height: 1.4;
  }
</style>
</head>
<body>

<!-- Floating hearts background -->
<div class="hearts-bg" id="heartsBg"></div>

<div class="container">

  <div class="title-block">
    <span class="title-emoji">💘</span>
    <h1>Test de <em>Amor</em></h1>
    <p class="subtitle">Descubrí qué tan compatibles son</p>
  </div>

  <div class="card">
    <div class="names-row">
      <div class="input-group">
        <label>Nombre 1</label>
        <input type="text" id="name1" placeholder="Tu nombre" maxlength="30">
      </div>
      <div class="heart-sep">❤️</div>
      <div class="input-group">
        <label>Nombre 2</label>
        <input type="text" id="name2" placeholder="Su nombre" maxlength="30">
      </div>
    </div>
    <button class="btn" onclick="calcular()">✨ Calcular</button>
  </div>

  <div class="results" id="results">
    <p class="result-title" id="resultTitle"></p>

    <div class="bar-item">
      <div class="bar-header">
        <span class="bar-label"><span class="bar-emoji">❤️</span> Amor</span>
        <span class="bar-pct" id="pct-amor">—</span>
      </div>
      <div class="bar-track"><div class="bar-fill" id="bar-amor"></div></div>
    </div>

    <div class="bar-item">
      <div class="bar-header">
        <span class="bar-label"><span class="bar-emoji">🔗</span> Compatibilidad</span>
        <span class="bar-pct" id="pct-compat">—</span>
      </div>
      <div class="bar-track"><div class="bar-fill" id="bar-compat"></div></div>
    </div>

    <div class="bar-item">
      <div class="bar-header">
        <span class="bar-label"><span class="bar-emoji">✨</span> Afinidad</span>
        <span class="bar-pct" id="pct-afin">—</span>
      </div>
      <div class="bar-track"><div class="bar-fill" id="bar-afin"></div></div>
    </div>

    <div class="bar-item">
      <div class="bar-header">
        <span class="bar-label"><span class="bar-emoji">🤝</span> Amistad</span>
        <span class="bar-pct" id="pct-amist">—</span>
      </div>
      <div class="bar-track"><div class="bar-fill" id="bar-amist"></div></div>
    </div>

    <div class="bar-item">
      <div class="bar-header">
        <span class="bar-label"><span class="bar-emoji">💍</span> Casamiento</span>
        <span class="bar-pct" id="pct-cas">—</span>
      </div>
      <div class="bar-track"><div class="bar-fill" id="bar-cas"></div></div>
    </div>

    <div class="verdict" id="verdict">
      <div class="verdict-emoji" id="verdictEmoji"></div>
      <p class="verdict-text" id="verdictText"></p>
    </div>
  </div>

</div>

<script>
  /* ---- Generate floating hearts ---- */
  const bg = document.getElementById('heartsBg');
  const heartsArr = ['❤️','🩷','💕','💗','💓','💖','💝'];
  for (let i = 0; i < 28; i++) {
    const h = document.createElement('span');
    h.classList.add('heart-float');
    h.textContent = heartsArr[Math.floor(Math.random() * heartsArr.length)];
    h.style.left = Math.random() * 100 + 'vw';
    h.style.fontSize = (0.9 + Math.random() * 1.6) + 'rem';
    h.style.animationDuration = (8 + Math.random() * 14) + 's';
    h.style.animationDelay = (Math.random() * 14) + 's';
    bg.appendChild(h);
  }

  /* ---- Color class helper ---- */
  function colorClass(v) {
    if (v < 40) return 'fill-low';
    if (v < 70) return 'fill-mid';
    return 'fill-high';
  }

  /* ---- Verdict helper ---- */
  function getVerdict(avg, n1, n2) {
    if (avg >= 85) return { e:'💞', t:`¡${n1} y ${n2} son una pareja perfecta! El universo los tiene destinados el uno para el otro.` };
    if (avg >= 70) return { e:'😍', t:`${n1} y ${n2} tienen una conexión muy especial. ¡Vale la pena apostar!` };
    if (avg >= 50) return { e:'🥰', t:`Hay chispa entre ${n1} y ${n2}. Con dedicación, todo es posible.` };
    if (avg >= 30) return { e:'🤔', t:`${n1} y ${n2} tienen diferencias, pero la amistad puede ser una gran base.` };
    return { e:'😅', t:`Quizás ${n1} y ${n2} son mejores como amigos… ¡aunque el amor sorprende!` };
  }

  /* ---- Main calc ---- */
  function calcular() {
    const n1 = document.getElementById('name1').value.trim();
    const n2 = document.getElementById('name2').value.trim();
    if (!n1 || !n2) {
      alert('¡Ingresá los dos nombres! 💕');
      return;
    }

    const rand = () => Math.floor(Math.random() * 100) + 1;
    const vals = {
      amor:   rand(),
      compat: rand(),
      afin:   rand(),
      amist:  rand(),
      cas:    rand()
    };

    const avg = Math.round(Object.values(vals).reduce((a,b)=>a+b,0) / 5);

    // Update title
    document.getElementById('resultTitle').textContent = `${n1} 💕 ${n2}`;

    // Update bars
    const map = [
      ['amor',   'pct-amor',   'bar-amor'],
      ['compat', 'pct-compat', 'bar-compat'],
      ['afin',   'pct-afin',   'bar-afin'],
      ['amist',  'pct-amist',  'bar-amist'],
      ['cas',    'pct-cas',    'bar-cas'],
    ];

    map.forEach(([key, pctId, barId]) => {
      document.getElementById(pctId).textContent = vals[key] + '%';
      const fill = document.getElementById(barId);
      fill.style.width = '0%';
      fill.className = 'bar-fill';
      // trigger reflow then animate
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          fill.classList.add(colorClass(vals[key]));
          fill.style.width = vals[key] + '%';
        });
      });
    });

    // Verdict
    const v = getVerdict(avg, n1, n2);
    document.getElementById('verdictEmoji').textContent = v.e;
    document.getElementById('verdictText').textContent  = v.t;

    // Show results
    const r = document.getElementById('results');
    r.classList.remove('visible');
    void r.offsetWidth; // reflow for re-animation
    r.classList.add('visible');
    r.style.display = 'flex';

    r.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  // Allow Enter key
  document.addEventListener('keydown', e => { if (e.key === 'Enter') calcular(); });
</script>
</body>
</html>
